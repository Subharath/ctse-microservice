services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/ctse-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - ctse-network

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/ctse-api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8000
      NODE_OPTIONS: --max-old-space-size=128
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      CART_SERVICE_URL: http://cart-service:3005
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - ctse-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user-service:
    image: ${DOCKERHUB_USERNAME}/ctse-user-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      NODE_OPTIONS: --max-old-space-size=128
      MONGODB_URI: ${USER_MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    expose:
      - "3001"
    networks:
      - ctse-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  product-service:
    image: ${DOCKERHUB_USERNAME}/ctse-product-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      NODE_OPTIONS: --max-old-space-size=128
      MONGODB_URI: ${PRODUCT_MONGODB_URI}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    expose:
      - "3002"
    networks:
      - ctse-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  order-service:
    image: ${DOCKERHUB_USERNAME}/ctse-order-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      NODE_OPTIONS: --max-old-space-size=128
      MONGODB_URI: ${ORDER_MONGODB_URI}
      PRODUCT_SERVICE_URL: http://product-service:3002
      USER_SERVICE_URL: http://user-service:3001
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    expose:
      - "3003"
    networks:
      - ctse-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  payment-service:
    image: ${DOCKERHUB_USERNAME}/ctse-payment-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      NODE_OPTIONS: --max-old-space-size=128
      MONGODB_URI: ${PAYMENT_MONGODB_URI}
      ORDER_SERVICE_URL: http://order-service:3003
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      order-service:
        condition: service_healthy
    expose:
      - "3004"
    networks:
      - ctse-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cart-service:
    image: ${DOCKERHUB_USERNAME}/ctse-cart-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      NODE_OPTIONS: --max-old-space-size=128
      MONGODB_URI: ${CART_MONGODB_URI}
      PRODUCT_SERVICE_URL: http://product-service:3002
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      product-service:
        condition: service_healthy
    expose:
      - "3005"
    networks:
      - ctse-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ctse-network:
    driver: bridge
