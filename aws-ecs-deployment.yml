        - Name: NODE_OPTIONS
          Value: --max-old-space-size=256
        - Name: MONGODB_URI
          Value:
            Ref: MongoDbUri
        - Name: JWT_SECRET
          Value:
            Ref: JwtSecret
        - Name: JWT_REFRESH_SECRET
          Value:
            Ref: JwtRefreshSecret
        - Name: GATEWAY_SHARED_SECRET
          Value:
            Ref: GatewaySharedSecret
        - Name: INTERNAL_SERVICE_SECRET
          Value:
            Ref: InternalServiceSecret
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group:
