AWSTemplateFormatVersion: '2010-09-09'
Description: AWS ECS Fargate deployment for CTSE Microservices
Parameters:
  DockerHubUsername:
    Type: String
    Description: Your DockerHub Username
  ImageTag:
    Type: String
    Default: latest
  MongoDbUri:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
  JwtRefreshSecret:
    Type: String
    NoEcho: true
  GatewaySharedSecret:
    Type: String
    NoEcho: true
  InternalServiceSecret:
    Type: String
    NoEcho: true
  CorsOrigin:
    Type: String
    Default: '*'
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
      - Key: Name
        Value: CTSE-VPC
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
      - Key: Name
        Value: CTSE-IGW
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:
        Ref: VPC
      InternetGatewayId:
        Ref: InternetGateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Ref: VPC
      Tags:
      - Key: Name
        Value: CTSE-PublicRouteTable
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId:
        Ref: PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId:
        Ref: InternetGateway
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        Fn::Select:
        - 0
        - Fn::GetAZs: ''
      Tags:
      - Key: Name
        Value: CTSE-PublicSubnet1
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        Fn::Select:
        - 1
        - Fn::GetAZs: ''
      Tags:
      - Key: Name
        Value: CTSE-PublicSubnet2
  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: PublicSubnet1
      RouteTableId:
        Ref: PublicRouteTable
  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: PublicSubnet2
      RouteTableId:
        Ref: PublicRouteTable
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: CTSE-Cluster
  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: ctse.local
      Vpc:
        Ref: VPC
  SecurityGroupALB:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP to ALB
      VpcId:
        Ref: VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 8000
        ToPort: 8000
        CidrIp: 0.0.0.0/0
  SecurityGroupECS:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB and internal
      VpcId:
        Ref: VPC
      SecurityGroupIngress:
      - IpProtocol: '-1'
        SourceSecurityGroupId:
          Ref: SecurityGroupALB
  SecurityGroupECSSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Ref: SecurityGroupECS
      IpProtocol: '-1'
      SourceSecurityGroupId:
        Ref: SecurityGroupECS
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: CTSE-ALB
      Subnets:
      - Ref: PublicSubnet1
      - Ref: PublicSubnet2
      SecurityGroups:
      - Ref: SecurityGroupALB
      Scheme: internet-facing
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/ctse/api-gateway
      RetentionInDays: 7
  ApiGatewayDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: api-gateway
      DnsConfig:
        NamespaceId:
          Ref: CloudMapNamespace
        DnsRecords:
        - Type: A
          TTL: 60
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1
  ApiGatewayTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ctse-api-gateway
      NetworkMode: awsvpc
      RequiresCompatibilities:
      - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn:
        Ref: TaskExecutionRole
      TaskRoleArn:
        Ref: TaskRole
      ContainerDefinitions:
      - Name: api-gateway
        Image:
          Fn::Sub: ${DockerHubUsername}/ctse-api-gateway:${ImageTag}
        PortMappings:
        - ContainerPort: 8000
        Environment:
        - Name: NODE_ENV
          Value: production
        - Name: PORT
          Value: '8000'
        - Name: NODE_OPTIONS
          Value: --max-old-space-size=256
        - Name: JWT_SECRET
          Value:
            Ref: JwtSecret
        - Name: JWT_REFRESH_SECRET
          Value:
            Ref: JwtRefreshSecret
        - Name: GATEWAY_SHARED_SECRET
          Value:
            Ref: GatewaySharedSecret
        - Name: CORS_ORIGIN
          Value:
            Ref: CorsOrigin
        - Name: USER_SERVICE_URL
          Value: http://user-service.ctse.local:3001
        - Name: PRODUCT_SERVICE_URL
          Value: http://product-service.ctse.local:3002
        - Name: ORDER_SERVICE_URL
          Value: http://order-service.ctse.local:3003
        - Name: PAYMENT_SERVICE_URL
          Value: http://payment-service.ctse.local:3004
        - Name: CART_SERVICE_URL
          Value: http://cart-service.ctse.local:3005
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group:
              Ref: ApiGatewayLogGroup
            awslogs-region:
              Ref: AWS::Region
            awslogs-stream-prefix: ecs
  ApiGatewayTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: CTSE-ApiGateway-TG
      VpcId:
        Ref: VPC
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
  ApiGatewayListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn:
        Ref: ALB
      Port: 8000
      Protocol: HTTP
      DefaultActions:
      - Type: forward
        TargetGroupArn:
          Ref: ApiGatewayTargetGroup
  ApiGatewayService:
    Type: AWS::ECS::Service
    DependsOn:
    - ApiGatewayListener
    Properties:
      Cluster:
        Ref: ECSCluster
      TaskDefinition:
        Ref: ApiGatewayTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
          - Ref: PublicSubnet1
          - Ref: PublicSubnet2
          SecurityGroups:
          - Ref: SecurityGroupECS
      ServiceRegistries:
      - RegistryArn:
          Fn::GetAtt:
          - ApiGatewayDiscoveryService
          - Arn
      LoadBalancers:
      - ContainerName: api-gateway
        ContainerPort: 8000
        TargetGroupArn:
          Ref: ApiGatewayTargetGroup
      DependsOn:
      - ApiGatewayListener
  UserServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/ctse/user-service
      RetentionInDays: 7
  UserServiceDiscoveryService:
