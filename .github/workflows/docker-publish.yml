name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  check-secrets:
    name: Check Docker Hub secrets
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Validate required secrets
        id: check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets found."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN."
          fi

  build-and-push:
    name: Build and Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
            dockerfile: ./api-gateway/Dockerfile
          - service: user-service
            context: ./user-service
            dockerfile: ./user-service/Dockerfile
          - service: product-service
            context: ./product-service
            dockerfile: ./product-service/Dockerfile
          - service: order-service
            context: ./order-service
            dockerfile: ./order-service/Dockerfile
          - service: payment-service
            context: ./payment-service
            dockerfile: ./payment-service/Dockerfile
          - service: cart-service
            context: ./cart-service
            dockerfile: ./cart-service/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push SHA tag
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ctse-${{ matrix.service }}:${{ github.sha }}

      - name: Build and push main-latest tag
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ctse-${{ matrix.service }}:latest

      - name: Build and push release tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ctse-${{ matrix.service }}:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ctse-${{ matrix.service }}:latest

  deploy-ecs:
    name: Force redeploy ECS services
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Force redeploy all ECS services
        run: |
          CLUSTER=CTSE-Cluster
          SERVICES=(ApiGatewayService UserServiceService ProductServiceService OrderServiceService PaymentServiceService CartServiceService FrontendService)
          for svc in "${SERVICES[@]}"; do
            echo "Redeploying $svc..."
            aws ecs update-service --cluster $CLUSTER --service $svc --force-new-deployment
          done

  missing-secrets-note:
    name: Missing secrets note
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.ready != 'true'
    steps:
      - name: Print setup instructions
        run: |
          echo "Docker Publish skipped."
          echo "Please add repository secrets:"
          echo "- DOCKERHUB_USERNAME"
          echo "- DOCKERHUB_TOKEN"
