name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: NPM Audit (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - product-service
          - order-service
          - payment-service
          - cart-service
          - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install --no-audit --no-fund

      - name: Run npm audit (high and critical)
        working-directory: ${{ matrix.service }}
        shell: bash
        run: |
          set +e
          npm audit --omit=dev --audit-level=high
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Security warning: vulnerabilities found in ${{ matrix.service }}"
            echo "Please review npm audit output and patch dependencies."
          fi
          exit 0

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
